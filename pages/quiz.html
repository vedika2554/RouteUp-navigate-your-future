<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Career Quiz</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#6a11cb,#2575fc);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}


.step-control{
    display:none;
}


.quiz-box{
    width:450px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}


.progress{
    height:8px;
    background:#eee;
    border-radius:10px;
    margin-bottom:20px;
}

.progress-bar{
    height:100%;
    background:#2575fc;
    width:20%;
    border-radius:10px;
    transition:0.4s;
}


.step{
    display:none;
    animation:fade 0.4s ease;
}

#q1:checked ~ .quiz-box .step1,
#q2:checked ~ .quiz-box .step2,
#q3:checked ~ .quiz-box .step3,
#q4:checked ~ .quiz-box .step4,
#q5:checked ~ .quiz-box .step5,
#q6:checked ~ .quiz-box .result{
    display:block;
}


#q1:checked ~ .quiz-box .progress-bar{width:20%;}
#q2:checked ~ .quiz-box .progress-bar{width:40%;}
#q3:checked ~ .quiz-box .progress-bar{width:60%;}
#q4:checked ~ .quiz-box .progress-bar{width:80%;}
#q5:checked ~ .quiz-box .progress-bar{width:100%;}


.question{
    font-size:18px;
    font-weight:bold;
    margin-bottom:15px;
}


.option{
    display:block;
    padding:12px;
    border:2px solid #ddd;
    border-radius:10px;
    margin:10px 0;
    cursor:pointer;
    transition:0.3s;
}

.option:hover{
    border-color:#2575fc;
    background:#f0f4ff;
}


.option input{
    display:none;
}


.option input:checked + span{
    color:#2575fc;
    font-weight:bold;
}


.next-btn{
    display:block;
    margin-top:15px;
    padding:10px;
    background:#2575fc;
    color:#fff;
    border-radius:6px;
    text-align:center;
    cursor:pointer;
}


.result{
    text-align:center;
}


@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body>

    <nav class="navbar">
    <div class="logo">RouteUp</div>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="explore.html">Explore</a></li>
        <li><a href="paths.html">Career Paths</a></li>
        <li><a href="quiz.html" class="active">Quiz</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<input type="radio" name="step" id="q1" class="step-control" checked>
<input type="radio" name="step" id="q2" class="step-control">
<input type="radio" name="step" id="q3" class="step-control">
<input type="radio" name="step" id="q4" class="step-control">
<input type="radio" name="step" id="q5" class="step-control">
<input type="radio" name="step" id="q6" class="step-control">

<div class="quiz-box">

<div class="progress">
    <div class="progress-bar"></div>
</div>


<div class="step step1">
    <div class="question">1. What do you enjoy the most?</div>
    <label class="option"><input type="radio" name="a1"><span>Coding / Technology</span></label>
    <label class="option"><input type="radio" name="a1"><span>Designing / Creativity</span></label>
    <label class="option"><input type="radio" name="a1"><span>Business / Management</span></label>
    <label for="q2" class="next-btn">Next</label>
</div>


<div class="step step2">
    <div class="question">2. What is your strongest skill?</div>
    <label class="option"><input type="radio" name="a2"><span>Logical Thinking</span></label>
    <label class="option"><input type="radio" name="a2"><span>Creativity</span></label>
    <label class="option"><input type="radio" name="a2"><span>Leadership</span></label>
    <label for="q3" class="next-btn">Next</label>
</div>

<div class="step step3">
    <div class="question">3. Which subject do you like most?</div>
    <label class="option"><input type="radio" name="a3"><span>Computer / Maths</span></label>
    <label class="option"><input type="radio" name="a3"><span>Arts / Design</span></label>
    <label class="option"><input type="radio" name="a3"><span>Commerce</span></label>
    <label for="q4" class="next-btn">Next</label>
</div>


<div class="step step4">
    <div class="question">4. What type of job do you prefer?</div>
    <label class="option"><input type="radio" name="a4"><span>Technical Job</span></label>
    <label class="option"><input type="radio" name="a4"><span>Creative Job</span></label>
    <label class="option"><input type="radio" name="a4"><span>Management Job</span></label>
    <label for="q5" class="next-btn">Next</label>
</div>


<div class="step step5">
    <div class="question">5. What is your career goal?</div>
    <label class="option"><input type="radio" name="a5"><span>Software Engineer</span></label>
    <label class="option"><input type="radio" name="a5"><span>Designer</span></label>
    <label class="option"><input type="radio" name="a5"><span>Entrepreneur</span></label>
    <label for="q6" class="next-btn">Submit</label>
</div>


<div class="step result">
    <h2>🎯 Suggested Career</h2>
    <p>💻 IT / 🎨 Design / 📊 Business</p>
  >
</div>

</div>

</body>
</html>
